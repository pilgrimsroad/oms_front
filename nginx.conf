server {
    listen 80;

    # React SPA - 모든 경로를 index.html로
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # /api/* 요청은 백엔드로 프록시
    location /api/ {
        proxy_pass http://oms-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
